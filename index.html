<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KP Finanzas</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#0f0f0f;
  color:white;
}

header{
  padding:15px;
  background:#111;
  text-align:center;
  font-weight:bold;
}

.container{
  padding:10px;
}

.row{
  display:flex;
  gap:8px;
  flex-wrap:wrap;
}

input,select{
  flex:1;
  padding:10px;
  border:none;
  border-radius:6px;
  background:#1e1e1e;
  color:white;
}

button{
  padding:10px;
  border:none;
  border-radius:6px;
  font-weight:bold;
  cursor:pointer;
}

.add{background:#00c853;}
.gasto{background:#f44336;}
.ingreso{background:#2196f3;}

.card{
  margin-top:10px;
  background:#1a1a1a;
  padding:10px;
  border-radius:8px;
}

.item{
  display:flex;
  justify-content:space-between;
  padding:8px;
  border-bottom:1px solid #333;
}

small{color:#aaa;}
</style>
</head>

<body>

<header>💰 KP FINANZAS</header>

<div class="container">

<!-- FORMULARIO -->
<div class="card">

<div class="row">
<select id="tipo">
<option value="Gasto">Gasto</option>
<option value="Ingreso">Ingreso</option>
</select>

<input id="concepto" placeholder="Concepto">
</div>

<div class="row">
<input id="categoria" placeholder="Categoría">
<input id="valor" placeholder="Valor">
</div>

<button class="add" onclick="agregar()">➕ Agregar</button>
</div>

<!-- RESUMEN -->
<div class="card">
<div id="resumen">Balance: $0</div>
</div>

<!-- LISTA -->
<div class="card" id="lista"></div>

</div>

<script>

const URL = "https://script.google.com/macros/s/AKfycbwpGEFrSCD1O2Wv8C395BQ7d6PBt1ZCCPwK_be3uRe5XD7jnsKJ9Wiym8DY59a-zmsD/exec";

let datos = JSON.parse(localStorage.getItem("kp_finanzas") || "[]");

function formatear(n){
  return "$ " + Number(n).toLocaleString("es-CO");
}

function guardarLocal(){
  localStorage.setItem("kp_finanzas", JSON.stringify(datos));
}

function agregar(){

  let tipo = document.getElementById("tipo").value;
  let concepto = document.getElementById("concepto").value;
  let categoria = document.getElementById("categoria").value;
  let valor = Number(document.getElementById("valor").value);

  if(!concepto || !valor){
    alert("Completa los campos");
    return;
  }

  let mov = {
    tipo,
    concepto,
    categoria,
    valor,
    mes: new Date().getMonth()+1,
    anio: new Date().getFullYear()
  };

  datos.push(mov);
  guardarLocal();
  enviarSheets(mov);
  render();

  document.getElementById("concepto").value = "";
  document.getElementById("valor").value = "";
}

function enviarSheets(mov){
  fetch(URL,{
    method:"POST",
    mode:"no-cors",
    body:JSON.stringify(mov)
  });
}

function eliminar(i){
  datos.splice(i,1);
  guardarLocal();
  render();
}

function render(){

  let lista = document.getElementById("lista");
  lista.innerHTML = "";

  let ingreso = 0;
  let gasto = 0;

  datos.forEach((m,i)=>{

    if(m.tipo === "Ingreso") ingreso += m.valor;
    else gasto += m.valor;

    lista.innerHTML += `
      <div class="item">
        <div>
          <b>${m.concepto}</b><br>
          <small>${m.tipo} · ${m.categoria}</small>
        </div>
        <div>
          ${formatear(m.valor)}
          <button onclick="eliminar(${i})">❌</button>
        </div>
      </div>
    `;
  });

  let balance = ingreso - gasto;

  document.getElementById("resumen").innerHTML =
    `Ingresos: ${formatear(ingreso)} <br>
     Gastos: ${formatear(gasto)} <br>
     <b>Balance: ${formatear(balance)}</b>`;
}

render();

</script>

</body>
</html>
